<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VR Fitness Gallery</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <style>
    body { margin: 0; }
  </style>

<script>
AFRAME.registerComponent('show-model', {
  schema: {
    message: { type: 'string' },
    model: { type: 'selector' }
  },

  init: function () {
    this.el.addEventListener('click', () => {

      document.querySelector('#infoText')
        .setAttribute('value', this.data.message);

      document.querySelectorAll('.fitness-model')
        .forEach(m => m.setAttribute('visible', false));

      if (this.data.model) {
        this.data.model.setAttribute('visible', true);
      }

    });
  }
});
</script>

</head>

<body>

<a-scene background="color: #0B0F1A">

  <!-- CAMERA -->
  <a-entity position="0 0 3" wasd-controls>
    <a-entity camera look-controls position="0 1.6 0">
      <a-cursor raycaster="objects: .clickable" color="#00FFFF"></a-cursor>
    </a-entity>
  </a-entity>

  <!-- LIGHTING (Neon Glow Style) -->
  <a-light type="ambient" intensity="0.5" color="#8899ff"></a-light>
  <a-light type="point" position="0 4 -3" intensity="1" color="#00ffff"></a-light>
  <a-light type="point" position="-3 3 2" intensity="0.8" color="#ff00ff"></a-light>
  <a-light type="point" position="3 3 2" intensity="0.8" color="#00ffcc"></a-light>

  <!-- FLOOR -->
  <a-plane position="0 -1 0" rotation="-90 0 0"
           width="12" height="12"
           color="#111827"
           material="metalness:0.3; roughness:0.4">
  </a-plane>

  <!-- WALLS -->
  <a-plane position="0 2 -6"
           width="12" height="5"
           color="#141B2D"
           material="emissive:#220033; emissiveIntensity:0.2">
  </a-plane>

  <a-plane position="-6 2 0"
           rotation="0 90 0"
           width="12" height="5"
           color="#101728"
           material="emissive:#002244; emissiveIntensity:0.2">
  </a-plane>

  <a-plane position="6 2 0"
           rotation="0 -90 0"
           width="12" height="5"
           color="#101728"
           material="emissive:#002244; emissiveIntensity:0.2">
  </a-plane>

  <!-- CEILING -->
  <a-plane position="0 5 0"
           rotation="90 0 0"
           width="12" height="12"
           color="#0f172a">
  </a-plane>

  <!-- NEON STRIPS -->
  <a-box position="0 4.9 -6" width="12" height="0.05" depth="0.2"
         material="emissive:#00ffff; emissiveIntensity:2"></a-box>

  <a-box position="-6 4.9 0" width="0.2" height="0.05" depth="12"
         material="emissive:#ff00ff; emissiveIntensity:2"></a-box>

  <a-box position="6 4.9 0" width="0.2" height="0.05" depth="12"
         material="emissive:#00ffcc; emissiveIntensity:2"></a-box>

  <!-- TEXT -->
  <a-text id="infoText"
          value="Fitness Room"
          position="0 4 -5.8"
          align="center"
          width="10"
          color="#00FFFF"
          material="emissive:#00ffff; emissiveIntensity:1.5">
  </a-text>

  <!-- ================= MODELS ================= -->

  <a-entity id="dumbbell3D" class="fitness-model"
            gltf-model="models/dumbbell.glb"
            position="0 0 2"
            scale="5 5 5"
            visible="false"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
  </a-entity>

  <a-entity id="kettlebell3D" class="fitness-model"
            gltf-model="models/kettlebell.glb"
            position="0 0 2"
            scale="0.5 0.5 0.5"
            visible="false"
            animation="property: rotation; to: 0 360 0; loop: true; dur: 6000">
  </a-entity>

  <a-entity id="treadmill3D" class="fitness-model"
            gltf-model="models/treadmill.glb"
            position="0 0 2"
            scale="1 1 1"
            visible="false">
  </a-entity>

  <a-entity id="punch3D" class="fitness-model"
            gltf-model="models/punch_bag.glb"
            position="0 0 2"
            scale="0.3 0.3 0.3"
            visible="false"
            animation="property: rotation; dir: alternate; dur: 1000; loop: true; to: 0 10 0">
  </a-entity>

  <!-- ================= POSTERS ================= -->

  <a-plane class="clickable"
           src="images/dumbbell.png"
           position="-3 1.6 -5.9"
           width="2" height="2"
           material="emissive:#00ffff; emissiveIntensity:0.3"
           show-model="message: Dumbbell Exercise; model: #dumbbell3D">
  </a-plane>

  <a-plane class="clickable"
           src="images/kettlebell.png"
           position="0 1.6 -5.9"
           width="2" height="2"
           material="emissive:#ff00ff; emissiveIntensity:0.3"
           show-model="message: Kettlebell Training; model: #kettlebell3D">
  </a-plane>

  <a-plane class="clickable"
           src="images/treadmill.png"
           position="3 1.6 -5.9"
           width="2" height="2"
           material="emissive:#00ffcc; emissiveIntensity:0.3"
           show-model="message: Treadmill Workout; model: #treadmill3D">
  </a-plane>

  <a-plane class="clickable"
           src="images/punch_bag.png"
           position="-5.8 1.6 0"
           rotation="0 90 0"
           width="2" height="2"
           material="emissive:#ffaa00; emissiveIntensity:0.3"
           show-model="message: Punch Bag Training; model: #punch3D">
  </a-plane>

</a-scene>

</body>
</html>
